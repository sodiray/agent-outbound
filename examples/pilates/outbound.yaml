list:
  name: pilates
  territory:
    home_base: Boise, ID
    max_visits_per_day: 8
    preferred_visit_days:
      - tue
      - wed
      - thu
    max_drive_radius_miles: 20
source:
  identity:
    - business_name
    - address
  searches:
    - id: yelp_pilates_boise
      description: Search Yelp for Pilates studios in Boise, ID
      query: Pilates studios in Boise, ID
      max_results: 100
      tool:
        toolkits:
          - YELP
      args:
        term: pilates
        location: Boise, ID
      output_map:
        business_name: name
        address: location.display_address
    - id: yelp_pilates_eagle
      description: Search Yelp for Pilates studios in Eagle, ID
      query: Pilates studios in Eagle, ID
      max_results: 100
      tool:
        toolkits:
          - YELP
      args:
        term: pilates
        location: Eagle, ID
      output_map:
        business_name: name
        address: location.display_address
    - id: yelp_pilates_meridian
      description: Search Yelp for Pilates studios in Meridian, ID
      query: Pilates studios in Meridian, ID
      max_results: 100
      tool:
        toolkits:
          - YELP
      args:
        term: pilates
        location: Meridian, ID
      output_map:
        business_name: name
        address: location.display_address
    - id: yelp_pilates_garden_city
      description: Search Yelp for Pilates studios in Garden City, ID
      query: Pilates studios in Garden City, ID
      max_results: 100
      tool:
        toolkits:
          - YELP
      args:
        term: pilates
        location: Garden City, ID
      output_map:
        business_name: name
        address: location.display_address
    - id: firecrawl_pilates_boise_metro
      description: Web search via Firecrawl for Pilates studios across the Boise metro area (Boise, Eagle, Meridian, Garden City)
      query: Pilates studios Boise metro area Eagle Meridian Garden City Idaho
      max_results: 100
      tool:
        toolkits:
          - FIRECRAWL
      output_map:
        business_name: name
        address: address
  filters:
    - id: filter_real_street_address
      description: >-
        Keep only studios that have a real street address located in Boise, Eagle, Meridian, or Garden City, ID. Exclude
        listings with missing, PO Box, or non-physical addresses, and exclude any records whose address falls outside
        these four cities.
      config:
        model: haiku
        concurrency: 10
        condition: >-
          The record has a valid physical street address (not a PO Box, not blank, not a suite-only address) and the
          city in the address is one of: Boise, Eagle, Meridian, or Garden City (all in Idaho).
enrich:
  - id: website_research
    description: >-
      Scrape the studio's website using Firecrawl to extract detailed information about offerings, brand, pricing, class
      types, studio vibe, and ownership.
    config:
      model: sonnet
      concurrency: 10
      cache: 14d
      tool:
        toolkits:
          - FIRECRAWL
      outputs:
        research_notes:
          type: string
          description: >-
            Detailed summary of the studio's offerings, brand identity, pricing signals, and general positioning — at
            least 150 words.
        owner_name:
          type: string
          description: >-
            Name of the studio owner or founder if found anywhere on the site (About page, bio, etc.). Leave blank if
            not found.
        class_types:
          type: string
          description: Comma-separated list of class or session types offered (e.g. 'Reformer, Mat, Barre, Private Sessions').
        studio_vibe:
          type: string
          description: Overall character and positioning of the studio based on its website content and branding.
          enum:
            - boutique
            - clinical
            - fitness-chain
            - community
            - luxury
  - id: contact_lookup
    description: >-
      Use Hunter and FullEnrich to find the best contact email and details for the studio owner, based on the owner name
      found during website research.
    config:
      model: sonnet
      concurrency: 10
      cache: 30d
      tool:
        toolkits:
          - HUNTER
          - FULLENRICH
      outputs:
        contact_email:
          type: string
          description: Best email address found for the studio owner or primary contact.
        contact_name:
          type: string
          description: Full name of the contact found.
        contact_title:
          type: string
          description: Role or title of the contact (e.g. Owner, Founder, Studio Director).
      depends_on:
        - website_research
  - id: online_content
    description: >-
      Search for the studio's blog and social media presence using web crawling. Identify active content channels and
      summarize their content footprint.
    config:
      model: sonnet
      concurrency: 10
      cache: 14d
      tool:
        toolkits:
          - FIRECRAWL
      outputs:
        has_blog:
          type: boolean
          description: Whether the studio has an active blog with published posts.
        has_social_media:
          type: boolean
          description: Whether the studio has active social media accounts on any platform.
        content_summary:
          type: string
          description: Short summary of the studio's overall content presence across blog and social channels.
        social_platforms:
          type: string
          description: >-
            Comma-separated list of social media platform names where the studio has a presence (e.g. 'Instagram,
            Facebook, TikTok').
  - id: hiring_check
    description: >-
      Search for open job postings associated with the studio using web crawling. Identify whether they are actively
      hiring and what roles are listed.
    config:
      model: haiku
      concurrency: 10
      cache: 7d
      tool:
        toolkits:
          - FIRECRAWL
      outputs:
        is_hiring:
          type: boolean
          description: Whether the studio currently has open job postings.
        hiring_roles:
          type: string
          description: Comma-separated list of open role names found (e.g. 'Pilates Instructor, Front Desk, Studio Manager').
        hiring_summary:
          type: string
          description: Short summary of what the hiring activity signals about the studio's growth or operational state.
score:
  fit:
    description: >-
      Rate how well this Pilates studio fits our ideal customer profile. Award high scores to independently owned
      (non-franchise) studios that have a professional website, offer multiple class types (especially Reformer), have
      been operating for at least a year, and have an identifiable owner with reachable contact information. Penalize
      franchises or chain affiliates, studios with no website or a very thin web presence, and records where no owner
      name or contact email could be found.
    model: haiku
  trigger:
    description: >-
      Rate the urgency of reaching out to this studio right now based on real-time buying signals. Score higher when the
      studio is actively hiring (especially instructor or operations roles), is producing content regularly on a blog or
      social media, or shows signs of growing review velocity. Lower urgency when there are no hiring signals, dormant
      or absent content channels, and flat or declining review activity.
    model: haiku
  priority:
    weight:
      fit: 0.6
      trigger: 0.4
sequences:
  default:
    on_reply: pause
    on_bounce: pause
    on_opt_out: stop
    steps:
      - id: day0_intro_email
        description: >-
          Send a personalized introductory email to the studio owner referencing specific details found on their website
          — class offerings, studio vibe, and brand positioning. Open with a relevant observation about their studio to
          establish credibility and introduce the value proposition.
        day: 0
        config:
          tool:
            tools:
              - GMAIL_SEND_EMAIL
          model: sonnet
          step_budget: 4
      - id: day3_followup_email
        description: >-
          Send a follow-up email in the same thread as the Day 0 intro. Lead with a new insight — a relevant industry
          trend, a hiring signal observed, or a content angle specific to this studio — to add value and prompt a reply.
          Keep it brief and conversational.
        day: 3
        condition: no reply to prior email
        config:
          tool:
            tools:
              - GMAIL_SEND_EMAIL
          model: sonnet
          step_budget: 4
      - id: day7_visit
        description: >-
          Conduct an in-person visit to the studio. Introduce yourself, ask for the owner or manager, leave collateral
          if unavailable, and note the outcome. Use the studio's class schedule and vibe details from enrichment to time
          the visit appropriately.
        day: 7
        condition: no reply to prior emails and at least one prior touchpoint has been completed
        config:
          disposition_options:
            - talked_to_owner
            - talked_to_staff
            - left_flyer
            - closed
            - come_back
            - not_a_fit
channels: {}
crm:
  provider: attio
